<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b0d17"/>
      <stop offset="100%" style="stop-color:#1a1f35"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="80" cy="60" r="4" fill="#e8eaf6" opacity="0.6"/>
  <circle cx="430" cy="100" r="3" fill="#e8eaf6" opacity="0.5"/>
  <circle cx="120" cy="410" r="3.5" fill="#e8eaf6" opacity="0.4"/>
  <circle cx="400" cy="400" r="4" fill="#e8eaf6" opacity="0.6"/>
  <circle cx="200" cy="50" r="2.5" fill="#e8eaf6" opacity="0.3"/>
  <circle cx="320" cy="450" r="3" fill="#e8eaf6" opacity="0.5"/>
  <circle cx="60" cy="250" r="2" fill="#e8eaf6" opacity="0.4"/>
  <circle cx="450" cy="260" r="2.5" fill="#e8eaf6" opacity="0.3"/>
  <!-- Coin circle -->
  <circle cx="256" cy="256" r="160" fill="#7c4dff" opacity="0.15"/>
  <circle cx="256" cy="256" r="148" fill="none" stroke="#7c4dff" stroke-width="6"/>
  <!-- Euro symbol -->
  <text x="256" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="190" font-weight="bold" fill="#e8eaf6">€</text>
  <!-- Rocket -->
  <text x="385" y="130" font-size="72">🚀</text>
</svg>
