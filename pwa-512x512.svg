<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070913"/>
      <stop offset="100%" stop-color="#0e1528"/>
    </linearGradient>
    <radialGradient id="coin" cx="36%" cy="30%" r="68%">
      <stop offset="0%" stop-color="#fff4a0"/>
      <stop offset="18%" stop-color="#ffd14d"/>
      <stop offset="48%" stop-color="#e8920a"/>
      <stop offset="80%" stop-color="#b56200"/>
      <stop offset="100%" stop-color="#7a3f00"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5a623" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="58" cy="52" r="3.2" fill="white" opacity="0.65"/>
  <circle cx="448" cy="80" r="2.7" fill="white" opacity="0.50"/>
  <circle cx="100" cy="428" r="3.7" fill="white" opacity="0.45"/>
  <circle cx="420" cy="414" r="3.2" fill="white" opacity="0.60"/>
  <circle cx="200" cy="40" r="2.4" fill="white" opacity="0.40"/>
  <circle cx="368" cy="464" r="2.7" fill="white" opacity="0.50"/>
  <circle cx="470" cy="298" r="2.4" fill="white" opacity="0.35"/>
  <circle cx="40" cy="235" r="2.7" fill="white" opacity="0.40"/>
  <circle cx="144" cy="118" r="2.1" fill="white" opacity="0.30"/>
  <circle cx="400" cy="140" r="2.1" fill="white" opacity="0.30"/>
  <circle cx="280" cy="475" r="1.9" fill="white" opacity="0.30"/>
  <circle cx="475" cy="182" r="2.1" fill="white" opacity="0.25"/>
  <circle cx="80" cy="335" r="1.9" fill="white" opacity="0.28"/>
  <circle cx="432" cy="340" r="1.6" fill="white" opacity="0.25"/>

  <!-- Orbit ellipse: center (256,256), rx=182, ry=48, rotate -12° -->
  <ellipse cx="256" cy="256" rx="182" ry="48"
    transform="rotate(-12 256 256)"
    fill="none" stroke="white" stroke-width="2"
    stroke-dasharray="8 13" opacity="0.22"/>

  <!-- Coin ambient glow -->
  <circle cx="256" cy="256" r="182" fill="url(#glow)"/>

  <!-- Main gold coin -->
  <circle cx="256" cy="256" r="134" fill="url(#coin)"/>
  <!-- Outer rim -->
  <circle cx="256" cy="256" r="134" fill="none" stroke="#7a3f00" stroke-width="6.5" opacity="0.55"/>
  <!-- Inner ridge ring -->
  <circle cx="256" cy="256" r="118" fill="none" stroke="#ffd14d" stroke-width="2.4" opacity="0.28"/>
  <!-- Shine highlight ellipse -->
  <ellipse cx="203" cy="198" rx="37" ry="21" fill="white" opacity="0.20"
    transform="rotate(-28 203 198)"/>

  <!-- Blue planet on orbit (~angle 150° rotated -12°): scale 192→512 of (40,117) -->
  <circle cx="107" cy="312" r="19" fill="#2e6fd4"/>
  <circle cx="101" cy="306" r="6.4" fill="#7ab3f5" opacity="0.70"/>

  <!-- Orange-red planet on orbit (~angle 330° rotated -12°): scale 192→512 of (152,75) -->
  <circle cx="405" cy="200" r="14.7" fill="#d94a1e"/>
  <circle cx="399" cy="194" r="4.8" fill="#f5896a" opacity="0.70"/>
</svg>
