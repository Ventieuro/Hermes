<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Body -->
  <ellipse cx="100" cy="140" rx="45" ry="50" fill="#8B6914"/>
  <!-- Belly -->
  <ellipse cx="100" cy="145" rx="30" ry="35" fill="#D4A84B"/>
  <!-- Head -->
  <circle cx="100" cy="75" r="38" fill="#8B6914"/>
  <!-- Face -->
  <ellipse cx="100" cy="82" rx="26" ry="24" fill="#D4A84B"/>
  <!-- Left ear -->
  <circle cx="62" cy="65" r="12" fill="#8B6914"/>
  <circle cx="62" cy="65" r="7" fill="#E8C07A"/>
  <!-- Right ear -->
  <circle cx="138" cy="65" r="12" fill="#8B6914"/>
  <circle cx="138" cy="65" r="7" fill="#E8C07A"/>
  <!-- Left eye -->
  <ellipse cx="88" cy="75" rx="6" ry="7" fill="white"/>
  <circle cx="89" cy="75" r="3.5" fill="#2D1B00"/>
  <circle cx="90" cy="74" r="1.2" fill="white"/>
  <!-- Right eye -->
  <ellipse cx="112" cy="75" rx="6" ry="7" fill="white"/>
  <circle cx="113" cy="75" r="3.5" fill="#2D1B00"/>
  <circle cx="114" cy="74" r="1.2" fill="white"/>
  <!-- Nose -->
  <ellipse cx="100" cy="87" rx="4" ry="3" fill="#5C3D0A"/>
  <!-- Smile -->
  <path d="M90 93 Q100 102 110 93" stroke="#5C3D0A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Left arm holding coins -->
  <path d="M58 130 Q40 120 35 100" stroke="#8B6914" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- Right arm holding coins -->
  <path d="M142 130 Q160 120 165 100" stroke="#8B6914" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- Left hand coins stack -->
  <ellipse cx="32" cy="95" rx="14" ry="5" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
  <ellipse cx="32" cy="91" rx="14" ry="5" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
  <ellipse cx="32" cy="87" rx="14" ry="5" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
  <text x="32" y="90" text-anchor="middle" font-size="7" font-weight="bold" fill="#8B6508">20</text>
  <!-- Right hand coins stack -->
  <ellipse cx="168" cy="95" rx="14" ry="5" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
  <ellipse cx="168" cy="91" rx="14" ry="5" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
  <ellipse cx="168" cy="87" rx="14" ry="5" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
  <text x="168" y="90" text-anchor="middle" font-size="7" font-weight="bold" fill="#8B6508">₿</text>
  <!-- Floating coins around -->
  <circle cx="25" cy="70" r="6" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
  <text x="25" y="73" text-anchor="middle" font-size="6" fill="#8B6508">$</text>
  <circle cx="175" cy="70" r="6" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
  <text x="175" y="73" text-anchor="middle" font-size="6" fill="#8B6508">€</text>
  <circle cx="50" cy="45" r="5" fill="#FFD700" stroke="#DAA520" stroke-width="1" opacity="0.7"/>
  <circle cx="150" cy="45" r="5" fill="#FFD700" stroke="#DAA520" stroke-width="1" opacity="0.7"/>
  <!-- Feet -->
  <ellipse cx="80" cy="190" rx="15" ry="8" fill="#8B6914"/>
  <ellipse cx="120" cy="190" rx="15" ry="8" fill="#8B6914"/>
  <!-- Tail -->
  <path d="M55 160 Q30 170 25 150 Q20 130 35 135" stroke="#8B6914" stroke-width="6" fill="none" stroke-linecap="round"/>
</svg>
